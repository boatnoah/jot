name: Jot
options:
  bundleIdPrefix: com.jot
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    # Sign with the Apple Development cert (not ad-hoc) so the bundle has a
    # stable code signature. macOS ties Screen Recording / Microphone (TCC)
    # grants to the signature, so ad-hoc builds lose the grant on every rebuild.
    # Manual signing with the cert hash avoids the "Mac Development" provisioning
    # lookup that automatic signing wants.
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: 9NWJ7M59WK
    CODE_SIGN_IDENTITY: 9350CDF728B6E325DCDAA016F8E6E5C6E5D82100
    ENABLE_HARDENED_RUNTIME: YES

targets:
  Jot:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Jot
      - path: Resources
        optional: true
    info:
      path: Jot/Info.plist
      properties:
        CFBundleName: Jot
        CFBundleDisplayName: Jot
        CFBundleIdentifier: com.jot.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSMicrophoneUsageDescription: "Jot records microphone audio while capture is active."
        NSScreenCaptureUsageDescription: "Jot needs Screen Recording permission to capture system audio. Jot does not record your screen."
    entitlements:
      path: Jot/Jot.entitlements
      properties:
        # Hardened-runtime key for mic access (the `.microphone` key is the
        # App Sandbox one and is ignored since the sandbox is disabled).
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jot.app
        INFOPLIST_FILE: Jot/Info.plist
        CODE_SIGN_ENTITLEMENTS: Jot/Jot.entitlements
        ENABLE_APP_SANDBOX: NO

  JotTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests
    dependencies:
      - target: Jot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jot.tests
        GENERATE_INFOPLIST_FILE: YES
        # Logic tests host in the app target (for @testable import Jot); the app
        # short-circuits its UI under XCTest.

schemes:
  Jot:
    build:
      targets:
        Jot: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JotTests
